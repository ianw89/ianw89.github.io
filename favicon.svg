<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#0a0a1a"/>
  
  <!-- Elliptical Galaxy 1 (top left, largest) -->
  <ellipse cx="10" cy="10" rx="5" ry="3.5" fill="#ffd700" opacity="0.3" transform="rotate(-30 10 10)"/>
  <ellipse cx="10" cy="10" rx="3.5" ry="2.5" fill="#ffea80" opacity="0.5" transform="rotate(-30 10 10)"/>
  <ellipse cx="10" cy="10" rx="2" ry="1.5" fill="#fff5b0" opacity="0.7" transform="rotate(-30 10 10)"/>
  <ellipse cx="10" cy="10" rx="0.8" ry="0.6" fill="#ffffff" opacity="0.9" transform="rotate(-30 10 10)"/>
  
  <!-- Elliptical Galaxy 2 (bottom right, medium) -->
  <ellipse cx="22" cy="22" rx="4" ry="3" fill="#ffd700" opacity="0.3" transform="rotate(45 22 22)"/>
  <ellipse cx="22" cy="22" rx="2.8" ry="2" fill="#ffea80" opacity="0.5" transform="rotate(45 22 22)"/>
  <ellipse cx="22" cy="22" rx="1.6" ry="1.2" fill="#fff5b0" opacity="0.7" transform="rotate(45 22 22)"/>
  <ellipse cx="22" cy="22" rx="0.7" ry="0.5" fill="#ffffff" opacity="0.9" transform="rotate(45 22 22)"/>
  
  <!-- Elliptical Galaxy 3 (top right, smallest) -->
  <ellipse cx="24" cy="8" rx="3" ry="2.2" fill="#ffd700" opacity="0.3" transform="rotate(15 24 8)"/>
  <ellipse cx="24" cy="8" rx="2" ry="1.5" fill="#ffea80" opacity="0.5" transform="rotate(15 24 8)"/>
  <ellipse cx="24" cy="8" rx="1.2" ry="0.9" fill="#fff5b0" opacity="0.7" transform="rotate(15 24 8)"/>
  <ellipse cx="24" cy="8" rx="0.5" ry="0.4" fill="#ffffff" opacity="0.9" transform="rotate(15 24 8)"/>
  
  <!-- Stars in background -->
  <circle cx="6" cy="26" r="0.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="28" cy="28" r="0.4" fill="#ffffff" opacity="0.8"/>
  <circle cx="4" cy="4" r="0.4" fill="#ffffff" opacity="0.8"/>
  <circle cx="16" cy="16" r="0.3" fill="#ffffff" opacity="0.7"/>
  <circle cx="8" cy="20" r="0.3" fill="#ffffff" opacity="0.7"/>
  <circle cx="26" cy="14" r="0.3" fill="#ffffff" opacity="0.7"/>
  <circle cx="12" cy="28" r="0.3" fill="#ffffff" opacity="0.7"/>
  <circle cx="30" cy="4" r="0.3" fill="#ffffff" opacity="0.7"/>
</svg>
